services:
  - type: web
    name: loyalty-be
    env: node
    plan: free
    region: oregon
    buildCommand: npm run render:build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 10000
      # Set these in Render dashboard or here with real values (do NOT commit secrets)
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false

